<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <table border="1" cellspacing="5" cellpadding="5" width="50%">

        <caption style="background-color: brown; color: wheat;">Employee Details</caption>

        <thead style="background-color: brown; color: wheat; text-align: center;">
            <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Id</th>
            </tr>
        </thead>
        <tbody style="background-color: wheat; color: brown; text-align: center;">
        <tr>
            <td>1</td>
            <td>AB</td>
            <td>E001</td>
        </tr>
        <tr>
            <td>2</td>
            <td>CD</td>
            <td>E002</td>
        </tr>
        <tr>
            <td>3</td>
            <td rowspan="2" colspan="2">Unavailable</td>
            <!-- <td>E003</td> -->
        </tr>
        <tr>
            <td>4</td>
            <!-- <td >Unavailable</td> -->
            <!-- <td>E004</td> -->
        </tr>
        </tbody>

        <tfoot style="background-color: brown; color: wheat; text-align: center;">
            <tr>
                <td colspan="3">Feedback: Good</td>
            </tr>
        </tfoot>
    </table>

    <table> 
        <colgroup>
            <col style="background-color: pink; color: rgb(195, 9, 117);">
            <col style="background-color: wheat; color: brown;">
            <col style="background-color: brown; color: wheat;">    
        </colgroup>
        <tr>
                <th>S.No</th>
                <th>Name</th>
                <th>Id</th>
        </tr>
        <tr>
            <td>1</td>
            <td>EF</td>
            <td>E005</td>
        </tr>
        <tr>
            <td>2</td>
            <td>GH</td>
            <td>E006</td>
        </tr>
    </table>
</body>
</html>
