<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <!--Text-->
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>

        <!--Number-->
        <label for="age">Age:</label>
        <input type="number" id="age" name="age"><br><br>

        <!--Radio Buttons-->
        <label for="gender">Gender:</label>
        <input type="radio" id="male" name="gender" value="male"> Male
        <input type="radio" id="female" name="gender" value="female"> Female
        <input type="radio" id="other" name="gender" value="other"> Other<br><br>

        <!--Dropdown-->
        <label for="subject">Subject:</label>
        <select id="subject" name="subject">
            <option value="math">Math</option>
            <option value="science">Science</option>
            <option value="english">English</option>
        </select><br><br>

        <!--Checkboxes-->
        <label for="subject">Subject:</label>
        <input type="checkbox" id="math" name="subject" value="math">
        <label for="math">Math</label>  
        <input type="checkbox" id="science" name="subject" value="science">
        <label for="science">Science</label>
        <input type="checkbox" id="english" name="subject" value="english">
        <label for="english">English</label>
        <br><br>

        <!--Password-->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <!--Time AND Date-->
        <label for="time">Time:</label>
        <input type="time" id="time" name="time"><br><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date"><br><br>

        <label for="datetime">Date and Time:</label>
        <input type="datetime-local" id="datetime" name="datetime"><br><br>

        <!--Color-->
        <label for="color">Color:</label>
        <input type="color" id="color" name="color"><br><br>

        <!--File Upload-->
        <label for="file">File:</label>
        <input type="file" id="file" name="file"><br><br>

        <!--Email-->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        <input type="submit" value="Submit">
        
    </form>
</body>
</html>
