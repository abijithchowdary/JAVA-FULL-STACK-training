server.port=9090
spring.application.name=LOGIN-SERVICE

# ${SPRING_DATASOURCE_URL} reads from environment variable
# If env var not set, uses the default value after the colon
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/ecommerce?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:billa}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

jwt.secret=${JWT_SECRET:mySecretKey12345mySecretKey12345mySecretKey12345}
jwt.expiration=${JWT_EXPIRATION:36000000}