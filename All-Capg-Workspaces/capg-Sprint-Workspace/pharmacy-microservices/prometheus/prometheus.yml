global:
  # Simple beginner-friendly scrape interval.
  # Prometheus will call /actuator/prometheus every 15 seconds.
  scrape_interval: 15s

scrape_configs:
  # ------------------------------------------------------------
  # API Gateway (WebFlux + Spring Cloud Gateway)
  # ------------------------------------------------------------
  - job_name: 'gateway-service'
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      # Targets inside the Docker network use the Compose service name.
      - targets: ['gateway-service:8888']

  # ------------------------------------------------------------
  # Microservices (scrape their Spring Boot Actuator endpoint)
  # ------------------------------------------------------------
  - job_name: 'auth-service'
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ['auth-service:9091']

  - job_name: 'catalog-service'
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ['catalog-service:9092']

  - job_name: 'order-service'
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ['order-service:9093']

  - job_name: 'admin-service'
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ['admin-service:9094']

  - job_name: 'payment-service'
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ['payment-service:9095']

  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    scheme: http
    static_configs:
      - targets: ['notification-service:9096']

