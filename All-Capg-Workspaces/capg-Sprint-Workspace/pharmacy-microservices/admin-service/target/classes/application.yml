spring:
  application:
    name: admin-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/admin_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 9094

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka
  instance:
    prefer-ip-address: false

jwt:
  secret: ${JWT_SECRET:pharmacy_super_secret_key_for_hs256_min_32chars}

feign:
  client:
    config:
      default:
        connectTimeout: 5000
        readTimeout: 5000

# -------------------------------------------------------------------
# Monitoring (Actuator + Micrometer Prometheus)
# -------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true