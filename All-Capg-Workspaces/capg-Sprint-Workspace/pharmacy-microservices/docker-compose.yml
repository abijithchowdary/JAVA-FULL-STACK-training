version: '3.8'

services:

  # ─── RabbitMQ ─────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: pharmacy-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - pharmacy-net

  # ─── MySQL ────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: pharmacy-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - pharmacy-net

  # ─── Eureka ───────────────────────────
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - pharmacy-net

  # ─── Gateway ──────────────────────────
  gateway-service:
    build: ./gateway-service
    container_name: gateway-service
    ports:
      - "8888:8888"
    environment:
      - EUREKA_HOST=eureka-server
      - JWT_SECRET=pharmacy_super_secret_key_for_hs256_min_32chars
    depends_on:
      - eureka-server
    networks:
      - pharmacy-net

  # ─── Auth ─────────────────────────────
  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "9091:9091"
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASS=root
      - EUREKA_HOST=eureka-server
    depends_on:
      - mysql
      - eureka-server
    networks:
      - pharmacy-net

  # ─── Catalog ──────────────────────────
  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    ports:
      - "9092:9092"
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASS=root
      - EUREKA_HOST=eureka-server
    depends_on:
      - mysql
      - eureka-server
    networks:
      - pharmacy-net

  # ─── Order ────────────────────────────
  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "9093:9093"
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASS=root
      - EUREKA_HOST=eureka-server
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - mysql
      - eureka-server
      - rabbitmq
    networks:
      - pharmacy-net

  # ─── Admin ────────────────────────────
  admin-service:
    build: ./admin-service
    container_name: admin-service
    ports:
      - "9094:9094"
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASS=root
      - EUREKA_HOST=eureka-server
    depends_on:
      - mysql
      - eureka-server
    networks:
      - pharmacy-net

  # ─── Payment ──────────────────────────
  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "9095:9095"
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASS=root
      - EUREKA_HOST=eureka-server
    depends_on:
      - mysql
      - eureka-server
    networks:
      - pharmacy-net

  # ─── Notification ─────────────────────
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "9096:9096"
    environment:
      - EUREKA_HOST=eureka-server
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - eureka-server
      - rabbitmq
    networks:
      - pharmacy-net

  # ─── Monitoring Stack (Prometheus + Grafana) ─────────────────────
  # These services scrape the Spring Boot Actuator endpoint:
  #   GET http://<service>:<port>/actuator/prometheus
  # and visualize it in Grafana.
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      # Prometheus scrape configuration (see prometheus/prometheus.yml)
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Optional persistence for the demo
      - prometheus-data:/prometheus
    networks:
      - pharmacy-net
    depends_on:
      - gateway-service

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      # Default login (requested): admin / admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - pharmacy-net
    depends_on:
      - prometheus

# ─── Volumes ────────────────────────────
volumes:
  mysql-data:
  prometheus-data:

# ─── Network ────────────────────────────
networks:
  pharmacy-net:
    driver: bridge