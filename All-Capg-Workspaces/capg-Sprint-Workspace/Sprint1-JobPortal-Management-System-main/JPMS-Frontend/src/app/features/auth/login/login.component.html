<div class="auth-container">
  <div class="glass-card auth-card animate-fade-in">
    <h2>Welcome Back</h2>
    <p class="subtitle">Log in to your account</p>

    <div *ngIf="error" class="error-alert">
      {{ error }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-control" formControlName="email" placeholder="you@example.com">
        <div class="error-msg" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Please enter a valid email.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" formControlName="password" placeholder="••••••••">
        <div class="error-msg" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Password is required.
        </div>
      </div>

      <button type="submit" class="btn-primary w-100" [disabled]="loading || loginForm.invalid">
        <span *ngIf="loading">Logging in...</span>
        <span *ngIf="!loading">Login</span>
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a routerLink="/auth/register">Sign up here</a>
    </div>
  </div>
</div>
