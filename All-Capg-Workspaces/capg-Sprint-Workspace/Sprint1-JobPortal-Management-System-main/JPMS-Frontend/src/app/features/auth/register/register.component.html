<div class="auth-container">
  <div class="glass-card auth-card animate-fade-in" style="max-width: 550px;">
    <h2>Join Us Today</h2>
    <p class="subtitle">Create a new account</p>

    <div *ngIf="error" class="error-alert">
      {{ error }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="form-row">
        <div class="form-group half-width">
          <label class="form-label" for="name">Full Name</label>
          <input type="text" id="name" class="form-control" formControlName="name" placeholder="John Doe">
          <div class="error-msg" *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
            Name is required.
          </div>
        </div>

        <div class="form-group half-width">
          <label class="form-label" for="phone">Phone (Optional)</label>
          <input type="tel" id="phone" class="form-control" formControlName="phone" placeholder="+1234567890">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" class="form-control" formControlName="email" placeholder="you@example.com">
        <div class="error-msg" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Please enter a valid email.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" class="form-control" formControlName="password" placeholder="Min. 8 characters">
        <div class="error-msg" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Password must be at least 8 characters.
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">I am a...</label>
        <div class="role-selector">
          <label class="role-option" [class.selected]="registerForm.get('role')?.value === 'JOB_SEEKER'">
            <input type="radio" formControlName="role" value="JOB_SEEKER">
            <span class="role-icon">👩‍💻</span>
            <span>Job Seeker</span>
          </label>
          <label class="role-option" [class.selected]="registerForm.get('role')?.value === 'RECRUITER'">
            <input type="radio" formControlName="role" value="RECRUITER">
            <span class="role-icon">🏢</span>
            <span>Recruiter</span>
          </label>
        </div>
      </div>

      <button type="submit" class="btn-primary w-100" [disabled]="loading || registerForm.invalid">
        <span *ngIf="loading">Creating account...</span>
        <span *ngIf="!loading">Create Account</span>
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a routerLink="/auth/login">Log in here</a>
    </div>
  </div>
</div>
