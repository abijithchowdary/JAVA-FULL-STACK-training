<div class="post-job-container">
  <div class="glass-card max-w-3xl mx-auto animate-fade-in">
    <h2>Post a New Job</h2>
    <p class="subtitle">Fill out the details below to attract top talent.</p>

    <div *ngIf="success" class="success-alert">
      ✅ Job posted successfully! Redirecting...
    </div>

    <div *ngIf="error" class="error-alert">
      {{ error }}
    </div>

    <form [formGroup]="jobForm" (ngSubmit)="onSubmit()" *ngIf="!success">
      <div class="form-group">
        <label class="form-label">Job Title *</label>
        <input type="text" class="form-control" formControlName="title" placeholder="e.g. Senior Software Engineer">
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label">Company Name *</label>
          <input type="text" class="form-control" formControlName="companyName" placeholder="Your Company">
        </div>
        <div class="form-group flex-1">
          <label class="form-label">Location *</label>
          <input type="text" class="form-control" formControlName="location" placeholder="e.g. Remote, New York">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group flex-1">
          <label class="form-label">Job Type *</label>
          <select class="form-control" formControlName="jobType">
            <option value="FULL_TIME">Full Time</option>
            <option value="PART_TIME">Part Time</option>
            <option value="CONTRACT">Contract</option>
            <option value="INTERNSHIP">Internship</option>
          </select>
        </div>
        <div class="form-group flex-1">
          <label class="form-label">Experience (Years) *</label>
          <input type="number" class="form-control" formControlName="experienceYears" min="0">
        </div>
        <div class="form-group flex-1">
          <label class="form-label">Salary (Optional)</label>
          <input type="number" class="form-control" formControlName="salary" placeholder="e.g. 120000">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Job Description *</label>
        <textarea class="form-control" formControlName="description" rows="8" placeholder="Describe the responsibilities, requirements, and benefits..."></textarea>
      </div>

      <div class="actions mt-4">
        <button type="submit" class="btn-primary" [disabled]="jobForm.invalid || loading">
          <span *ngIf="loading">Posting...</span>
          <span *ngIf="!loading">Post Job</span>
        </button>
      </div>
    </form>
  </div>
</div>
